spring.application.name=KabllixAPI
server.port=8080

# =========================================================
# BASE DE DONNEES POSTGRESQL
# =========================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/kabllix_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================================
# HIBERNATE / JPA
# 'update' : Cree les tables si elles n'existent pas,
#             met a jour si le schema change.
#             Ne jamais utiliser 'create' en production
#             (efface toutes les donnees a chaque demarrage)
# =========================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================================================
# FLYWAY — Gestionnaire de migrations SQL
# =========================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# =========================================================
# SERIALISATION JSON (Jackson)
# Ignorer les champs null dans les reponses API
# =========================================================
spring.jackson.default-property-inclusion=non_null

# =========================================================
# LOGS
# =========================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.kabllix=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.cors=DEBUG
